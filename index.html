<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄像头调用系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 整体布局：左侧导航 + 右侧内容 */
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 左侧导航栏样式 */
        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #34495e;
        }

        .nav-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 14px 20px;
            margin: 8px 15px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            text-align: left;
        }

        .nav-btn:hover {
            background-color: #2980b9;
        }

        .nav-btn.active {
            background-color: #27ae60;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .content-title {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* 摄像头选择下拉框 */
        .camera-select-container {
            margin-bottom: 20px;
            width: 80%;
            max-width: 700px;
            display: none; /* 默认隐藏 */
        }

        #cameraSelect {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            background-color: white;
        }

        /* 摄像头视频区域 */
        #video {
            width: 80%;
            max-width: 700px;
            height: auto;
            background-color: #000;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            margin-bottom: 25px;
            display: none; /* 默认隐藏 */
        }

        /* 操作按钮组 */
        .control-group {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        #startBtn {
            background-color: #27ae60;
            color: white;
        }

        #stopBtn {
            background-color: #e74c3c;
            color: white;
            display: none; /* 默认隐藏 */
        }

        .control-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <h2 class="sidebar-title">功能导航</h2>
            <button class="nav-btn active" id="cameraNav">摄像头功能</button>
            <button class="nav-btn">首页</button>
            <button class="nav-btn">设置</button>
            <button class="nav-btn">帮助</button>
        </div>

        <!-- 右侧主内容区 -->
        <div class="main-content">
            <h3 class="content-title">摄像头实时预览</h3>
            
            <!-- 摄像头选择下拉框 -->
            <div class="camera-select-container" id="cameraSelectContainer">
                <select id="cameraSelect"></select>
            </div>

            <!-- 视频显示区域 -->
            <video id="video" autoplay playsinline></video>
            
            <!-- 操作按钮 -->
            <div class="control-group">
                <button class="control-btn" id="startBtn">开启摄像头</button>
                <button class="control-btn" id="stopBtn">关闭摄像头</button>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const cameraNav = document.getElementById('cameraNav');
        const cameraSelect = document.getElementById('cameraSelect');
        const cameraSelectContainer = document.getElementById('cameraSelectContainer');
        
        let mediaStream = null; // 存储摄像头流
        let cameraDevices = []; // 存储所有摄像头设备

        // 左侧导航栏按钮点击效果
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // 获取所有摄像头设备列表
        async function getCameraDevices() {
            try {
                // 必须先请求权限才能获取设备列表
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                // 获取所有媒体设备
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                // 筛选出视频设备（摄像头）
                cameraDevices = devices.filter(device => device.kind === 'videoinput');
                
                // 清空下拉框
                cameraSelect.innerHTML = '';
                
                // 将摄像头添加到下拉框
                cameraDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `摄像头 ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
                
                return cameraDevices;
            } catch (err) {
                console.error('获取摄像头列表失败：', err);
                return [];
            }
        }

        // 根据选择的摄像头ID开启摄像头
        async function startSelectedCamera(deviceId = null) {
            try {
                // 停止之前的摄像头
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }

                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId } } : true,
                    audio: false
                };

                // 调用摄像头
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;

                // 显示视频和关闭按钮，隐藏开启按钮
                video.style.display = 'block';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
            } catch (err) {
                alert(`摄像头调用失败：${err.message}`);
                console.error('摄像头错误：', err);
            }
        }

        // 开启摄像头（主函数）
        async function startCamera() {
            // 先获取摄像头列表
            await getCameraDevices();
            
            // 显示下拉选择框
            cameraSelectContainer.style.display = 'block';
            
            // 启动默认摄像头
            await startSelectedCamera();
        }

        // 关闭摄像头
        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            
            // 隐藏视频和下拉框，显示开启按钮
            video.style.display = 'none';
            cameraSelectContainer.style.display = 'none';
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
        }

        // 下拉框切换摄像头
        cameraSelect.addEventListener('change', async () => {
            const selectedDeviceId = cameraSelect.value;
            await startSelectedCamera(selectedDeviceId);
        });

        // 绑定事件
        cameraNav.addEventListener('click', startCamera);
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
    </script>
</body>
</html>
