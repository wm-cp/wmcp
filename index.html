<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>用户登录</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    .container{width:400px;margin:80px auto;padding:30px;border:1px solid #ddd;border-radius:8px}
    h2{text-align:center;margin-bottom:20px}
    .input-group{margin-bottom:15px}
    input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px}
    button{width:100%;padding:10px;background:#409eff;color:white;border:none;border-radius:4px;font-size:16px;cursor:pointer}
    .link{text-align:center;margin-top:15px}
    .msg{color:red;text-align:center;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="container">
    <h2>用户登录</h2>
    <div id="msg" class="msg"></div>
    <div class="input-group">
      <input type="text" id="username" placeholder="请输入账号">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button onclick="login()">登录</button>
    <div class="link">没有账号？<a href="register.html">立即注册</a></div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('msg');

      if(!username || !password){
        msg.textContent = '请输入账号和密码';
        return;
      }

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username,password})
      });
      const data = await res.json();
      msg.textContent = data.msg;
      if(data.code === 1) setTimeout(()=>location.href='/',1000);
    }
  </script>
</body>
</html>
