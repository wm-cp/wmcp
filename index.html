<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s;
    }

    .login-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .sub-title {
      text-align: center;
      color: #999;
      margin-bottom: 35px;
      font-size: 14px;
    }

    .input-item {
      margin-bottom: 24px;
    }

    .input-item label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    .input-item input {
      width: 100%;
      height: 46px;
      padding: 0 15px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.3s;
    }

    .input-item input:focus {
      border-color: #667eea;
    }

    .msg {
      text-align: center;
      color: #f56c6c;
      margin-bottom: 20px;
      font-size: 14px;
      min-height: 20px;
    }

    .btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .to-register {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #666;
    }

    .to-register a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .to-register a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="title">用户登录</div>
    <div class="sub-title">欢迎回来，请登录您的账号</div>
    <div id="msg" class="msg"></div>

    <div class="input-item">
      <label>账号</label>
      <input type="text" id="username" placeholder="请输入账号">
    </div>

    <div class="input-item">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>

    <button class="btn" onclick="login()">登录</button>

    <div class="to-register">
      没有账号？<a href="register.html">立即注册</a>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('msg');

      if (!username || !password) {
        msg.textContent = '请输入账号和密码';
        return;
      }

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      msg.textContent = data.msg;

      if (data.code === 1) {
        msg.style.color = '#67c23a';
        setTimeout(() => location.href = '/', 1000);
      }
    }
  </script>
</body>
</html>
