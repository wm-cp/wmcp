<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 页面</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 页面整体布局：左侧侧边栏 + 右侧内容 */
        body {
            display: flex;
            min-height: 100vh;
        }

        /* ======================
           左侧固定侧边栏导航
        ====================== */
        .sidebar {
            width: 250px;           /* 侧边栏宽度 */
            background: #2c3e50;     /* 侧边栏背景色（深色） */
            color: white;
            padding: 30px 20px;
            position: fixed;         /* 固定在左侧不滚动 */
            height: 100vh;           /* 高度占满屏幕 */
        }

        /* 侧边栏标题 */
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        /* 导航菜单列表 */
        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin: 15px 0;
        }

        /* 导航链接样式 */
        .sidebar ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: block;
            padding: 10px;
            border-radius: 4px;
            transition: 0.3s;
        }

        /* 鼠标悬浮效果 */
        .sidebar ul li a:hover {
            background: #34495e;
            padding-left: 15px;
        }

        /* ======================
           右侧主内容区域
        ====================== */
        .content {
            margin-left: 250px;       /* 避开左侧侧边栏 */
            padding: 40px;
            flex: 1;
            background: #f5f5f5;
        }

        .content h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .content p {
            font-size: 18px;
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- 左侧侧边栏 -->
    <div class="sidebar">
        <h2>导航菜单</h2>
        <ul>
            <li><a href="#home">首页</a></li>
            <li><a href="#about">关于我</a></li>
            <li><a href="#project">项目</a></li>
            <li><a href="#blog">博客</a></li>
            <li><a href="#contact">联系我</a></li>
        </ul>
    </div>

    <!-- 右侧主内容 -->
    <div class="content">
        <h1>欢迎来到我的 GitHub Pages 页面</h1>
        <p>这里是主内容区域，左侧已经成功添加了固定侧边栏导航~</p>
        <br>
        <p>你可以自由修改导航菜单、颜色、文字和内容。</p>
    </div>

</body>
</html>
