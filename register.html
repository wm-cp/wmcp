<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号注册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s;
    }

    .register-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .sub-title {
      text-align: center;
      color: #999;
      margin-bottom: 35px;
      font-size: 14px;
    }

    .input-item {
      margin-bottom: 22px;
    }

    .input-item label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    .input-item input {
      width: 100%;
      height: 46px;
      padding: 0 15px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.3s;
    }

    .input-item input:focus {
      border-color: #667eea;
    }

    .tip {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .msg {
      text-align: center;
      color: #f56c6c;
      margin-bottom: 20px;
      font-size: 14px;
      min-height: 20px;
    }

    .btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .to-login {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #666;
    }

    .to-login a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .to-login a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <div class="title">用户注册</div>
    <div class="sub-title">欢迎创建您的账号</div>
    <div id="msg" class="msg"></div>

    <div class="input-item">
      <label>账号</label>
      <input type="text" id="username" placeholder="请输入账号（仅中文/英文/数字）">
      <div class="tip">不允许包含特殊字符</div>
    </div>

    <div class="input-item">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码（不少于6位）">
      <div class="tip">密码长度 ≥ 6 位</div>
    </div>

    <div class="input-item">
      <label>确认密码</label>
      <input type="password" id="repassword" placeholder="请再次输入密码">
    </div>

    <button class="btn" onclick="register()">立即注册</button>

    <div class="to-login">
      已有账号？<a href="index.html">立即登录</a>
    </div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const repassword = document.getElementById('repassword').value.trim();
      const msg = document.getElementById('msg');

      // 非空校验
      if (!username || !password || !repassword) {
        msg.textContent = '请填写完整信息';
        return;
      }

      // 密码长度 ≥6
      if (password.length < 6) {
        msg.textContent = '密码长度不能少于6位！';
        return;
      }

      // 两次密码一致
      if (password !== repassword) {
        msg.textContent = '两次输入的密码不一致！';
        return;
      }

      // 特殊字符校验
      const specialReg = /[^\u4e00-\u9fa5a-zA-Z0-9]/;
      if (specialReg.test(username)) {
        msg.textContent = '账号不允许包含特殊字符！';
        return;
      }

      // 提交注册
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      msg.textContent = data.msg;

      if (data.code === 1) {
        msg.style.color = '#67c23a';
        setTimeout(() => location.href = 'index.html', 1500);
      }
    }
  </script>
</body>
</html>
